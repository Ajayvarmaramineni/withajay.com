  <style>
    body {
      opacity: 0;
      transition: opacity 0.5s ease;
      background: #fff;
      color: #111;
    }

    /* Post layout */
    .post-wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .post-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.3s ease;
    }
    .post-back:hover { color: #111; }
    .post-back::before { content: '←'; font-size: 1rem; }

    .post-header {
      margin-bottom: 36px;
    }

    .post-category {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }

    #post-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    .post-meta-row {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: #888;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .post-meta-row span::after {
      content: '·';
      margin-left: 16px;
    }
    .post-meta-row span:last-child::after { content: ''; }

    /* Hero image */
    #post-hero-img {
      width: 100%;
      height: auto;
      max-height: 420px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 40px;
      display: none;
    }

    /* Post body typography */
    #post-body {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #333;
    }

    #post-body h1, #post-body h2, #post-body h3 {
      font-family: 'Playfair Display', Georgia, serif;
      margin: 36px 0 16px;
      color: #111;
    }
    #post-body h2 { font-size: 1.5rem; }
    #post-body h3 { font-size: 1.2rem; }

    #post-body p {
      margin-bottom: 20px;
    }

    #post-body blockquote {
      border-left: 3px solid #111;
      padding: 8px 0 8px 24px;
      margin: 28px 0;
      color: #555;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.65;
    }

    #post-body code {
      font-family: 'Courier New', monospace;
      font-size: 0.88em;
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 3px;
    }

    #post-body strong { font-weight: 700; color: #111; }
    #post-body em { font-style: italic; }

    #post-body ul {
      list-style: disc;
      padding-left: 24px;
      margin-bottom: 20px;
    }

    #post-body ul li {
      margin-bottom: 8px;
    }

    #post-body hr {
      border: none;
      border-top: 1px solid #e0e0e0;
      margin: 40px 0;
    }

    #post-body a {
      color: #111;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #post-body a:hover { color: #888; }

    /* Post footer */
    .post-footer {
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .post-footer .back-link {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      transition: color 0.3s ease;
    }
    .post-footer .back-link:hover { color: #111; }
  </style>
</head>
