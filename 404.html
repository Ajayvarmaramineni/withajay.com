  <style>
    .not-found-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 48px 24px;
    }
    .not-found-code {

      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 700;
      color: #e0e0e0;
      line-height: 1;
      margin-bottom: 16px;
    }
    .not-found-title {

      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: #111;
      margin-bottom: 16px;
    }
    .not-found-message {
      font-size: 1rem;
      color: #888;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .not-found-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .not-found-links a {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
      padding-bottom: 2px;
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    .not-found-links a:hover {
      color: #888;
      border-color: #888;
    }
